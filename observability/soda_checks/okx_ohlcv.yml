filter btc_ohlcv [okx]:
  where: exchange = 'okx'

checks for btc_ohlcv [okx]:
  # OKX data must have been refreshed within the last 10 minutes
  - freshness(ingested_at) < 10m

  # Must have rows from OKX
  - row_count > 0

  # No duplicate candles for OKX
  - duplicate_count(open_time) = 0

  # OKX confirm field must not be null
  - missing_count(confirm) = 0
